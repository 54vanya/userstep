# Раздача статики PIU StepMaker (Vite PWA). Файл попадает в образ как
# /etc/nginx/conf.d/default.conf (см. Dockerfile).
#
# Ключевое — политика кэширования под PWA-обновления (registerType: 'prompt'):
# sw.js / manifest / index.html всегда ревалидируются, иначе установленное
# приложение не узнаёт о новой версии; хэшированные ассеты — иммутабельный год.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Service worker и его рантайм — только с ревалидацией.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }

    # .webmanifest нет в стандартном mime.types nginx.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Хэшированные бандлы Vite — можно кэшировать навечно.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    # workbox-<hash>.js лежит в корне, но тоже хэширован.
    location ~* ^/workbox-.+\.js$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA-fallback (маршрутов нет, но PWA file_handlers открывают "/").
    location / {
        try_files $uri $uri/ /index.html;
    }
}
