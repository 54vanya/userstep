<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Иконка PIU StepMaker: пад Pump It Up (4 диагональные стрелки + центральная
       панель) в цветах заголовков колонок редактора, на тёмном поле с линиями
       битов и красной хит-линией. Мастер-файл: из него рендерятся icon-192/512. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26262b"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
    <!-- Стрелка вверх, центр в (0,0); повороты дают 4 диагонали -->
    <path id="arrow" d="M -52 -8 L 0 -60 L 52 -8 L 20 -8 L 20 56 L -20 56 L -20 -8 Z"/>
    <clipPath id="round"><rect width="512" height="512" rx="112"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- линии битов -->
    <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="4">
      <line x1="0" y1="64" x2="512" y2="64"/>
      <line x1="0" y1="128" x2="512" y2="128"/>
      <line x1="0" y1="192" x2="512" y2="192"/>
      <line x1="0" y1="320" x2="512" y2="320"/>
      <line x1="0" y1="384" x2="512" y2="384"/>
      <line x1="0" y1="448" x2="512" y2="448"/>
    </g>
    <!-- хит-линия -->
    <line x1="0" y1="256" x2="512" y2="256" stroke="#ef4444" stroke-opacity="0.85" stroke-width="8"/>
    <g stroke="#000000" stroke-opacity="0.3" stroke-width="6" stroke-linejoin="round">
      <use href="#arrow" transform="translate(150 150) rotate(-45)" fill="#60a5fa"/>
      <use href="#arrow" transform="translate(362 150) rotate(45)" fill="#60a5fa"/>
      <use href="#arrow" transform="translate(150 362) rotate(-135)" fill="#fb923c"/>
      <use href="#arrow" transform="translate(362 362) rotate(135)" fill="#fb923c"/>
      <!-- центральная панель (BeveledSquare из ColumnHeaders, 16-сетка × 7) -->
      <polygon transform="translate(200 200)" fill="#fde047"
        points="28,0 84,0 112,28 112,84 84,112 28,112 0,84 0,28"/>
    </g>
  </g>
</svg>
